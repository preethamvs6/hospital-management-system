<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors — MedCore HMS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <button class="mobile-toggle">☰</button>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">MedCore<span>Hospital Management</span></div></div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item" data-page="dashboard.html"><span class="icon">📊</span> Dashboard</a>
                <a href="/doctors.html" class="nav-item" data-page="doctors.html"><span class="icon">🩺</span> Doctors</a>
                <a href="/patients.html" class="nav-item" data-page="patients.html"><span class="icon">🧑‍🤝‍🧑</span> Patients</a>
                <a href="/appointments.html" class="nav-item" data-page="appointments.html"><span class="icon">📅</span> Appointments</a>
                <a href="/billing.html" class="nav-item" data-page="billing.html"><span class="icon">💳</span> Billing</a>
                <a href="/contact.html" class="nav-item" data-page="contact.html"><span class="icon">📞</span> Contact</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar" id="user-avatar">A</div><div><div class="user-name" id="user-display-name">User</div><div class="user-role" id="user-display-role">ADMIN</div></div></div>
                <button class="btn btn-secondary btn-sm" onclick="logout()" style="width:100%;margin-top:12px;">🚪 Logout</button>
            </div>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <div><h1 class="page-title">Doctor Management</h1><p class="page-subtitle">View and manage hospital doctors</p></div>
                <div class="header-actions"><button class="btn btn-primary btn-sm" onclick="openModal('add-doctor-modal')">+ Add Doctor</button></div>
            </div>
            <div class="content-area">
                <div class="table-container slide-up">
                    <div class="table-header">
                        <h3 class="table-title">All Doctors</h3>
                        <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="doctor-search" placeholder="Search doctors..." oninput="searchDoctors()"></div>
                    </div>
                    <table><thead><tr><th>Name</th><th>Specialization</th><th>Department</th><th>Fee</th><th>Contact</th><th>Actions</th></tr></thead>
                    <tbody id="doctors-table"><tr><td colspan="6"><div class="spinner"></div></td></tr></tbody></table>
                    <div class="pagination" id="doctor-pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="add-doctor-modal">
        <div class="modal">
            <div class="modal-header"><h3 class="modal-title">Add New Doctor</h3><button class="modal-close" onclick="closeModal('add-doctor-modal')">✕</button></div>
            <form id="add-doctor-form">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-control" id="doc-fullName" required></div>
                    <div class="form-group"><label class="form-label">Username</label><input type="text" class="form-control" id="doc-username" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="doc-email" required></div>
                    <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-control" id="doc-password" required minlength="6"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Specialization</label><input type="text" class="form-control" id="doc-specialization" required></div>
                    <div class="form-group"><label class="form-label">Department</label><input type="text" class="form-control" id="doc-department"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Qualification</label><input type="text" class="form-control" id="doc-qualification"></div>
                    <div class="form-group"><label class="form-label">License Number</label><input type="text" class="form-control" id="doc-license"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-control" id="doc-phone"></div>
                    <div class="form-group"><label class="form-label">Consultation Fee ($)</label><input type="number" class="form-control" id="doc-fee" min="0" step="0.01"></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal('add-doctor-modal')">Cancel</button><button type="submit" class="btn btn-primary">Add Doctor</button></div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="edit-doctor-modal">
        <div class="modal">
            <div class="modal-header"><h3 class="modal-title">Edit Doctor</h3><button class="modal-close" onclick="closeModal('edit-doctor-modal')">✕</button></div>
            <form id="edit-doctor-form">
                <input type="hidden" id="edit-doc-id">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-control" id="edit-doc-fullName" required></div>
                    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="edit-doc-email" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Specialization</label><input type="text" class="form-control" id="edit-doc-specialization" required></div>
                    <div class="form-group"><label class="form-label">Department</label><input type="text" class="form-control" id="edit-doc-department"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-control" id="edit-doc-phone"></div>
                    <div class="form-group"><label class="form-label">Consultation Fee</label><input type="number" class="form-control" id="edit-doc-fee" min="0" step="0.01"></div>
                </div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal('edit-doctor-modal')">Cancel</button><button type="submit" class="btn btn-primary">Save Changes</button></div>
            </form>
        </div>
    </div>
    <script src="/js/app.js"></script>
    <script src="/js/doctors.js"></script>
</body>
</html>
