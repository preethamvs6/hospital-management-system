<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients — MedCore HMS</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-layout">
        <button class="mobile-toggle">☰</button>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><div class="sidebar-logo">MedCore<span>Hospital Management</span></div></div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item" data-page="dashboard.html"><span class="icon">📊</span> Dashboard</a>
                <a href="/doctors.html" class="nav-item" data-page="doctors.html"><span class="icon">🩺</span> Doctors</a>
                <a href="/patients.html" class="nav-item" data-page="patients.html"><span class="icon">🧑‍🤝‍🧑</span> Patients</a>
                <a href="/appointments.html" class="nav-item" data-page="appointments.html"><span class="icon">📅</span> Appointments</a>
                <a href="/billing.html" class="nav-item" data-page="billing.html"><span class="icon">💳</span> Billing</a>
                <a href="/contact.html" class="nav-item" data-page="contact.html"><span class="icon">📞</span> Contact</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info"><div class="user-avatar" id="user-avatar">A</div><div><div class="user-name" id="user-display-name">User</div><div class="user-role" id="user-display-role">ADMIN</div></div></div>
                <button class="btn btn-secondary btn-sm" onclick="logout()" style="width:100%;margin-top:12px;">🚪 Logout</button>
            </div>
        </aside>
        <main class="main-content">
            <div class="page-header">
                <div><h1 class="page-title">Patient Management</h1><p class="page-subtitle">View and manage registered patients</p></div>
            </div>
            <div class="content-area">
                <div class="table-container slide-up">
                    <div class="table-header">
                        <h3 class="table-title">All Patients</h3>
                        <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="patient-search" placeholder="Search patients..." oninput="searchPatients()"></div>
                    </div>
                    <table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Gender</th><th>Blood Group</th><th>Actions</th></tr></thead>
                    <tbody id="patients-table"><tr><td colspan="6"><div class="spinner"></div></td></tr></tbody></table>
                </div>
            </div>
        </main>
    </div>
    <div class="modal-overlay" id="edit-patient-modal">
        <div class="modal">
            <div class="modal-header"><h3 class="modal-title">Edit Patient</h3><button class="modal-close" onclick="closeModal('edit-patient-modal')">✕</button></div>
            <form id="edit-patient-form">
                <input type="hidden" id="edit-pat-id">
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-control" id="edit-pat-fullName" required></div>
                    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="edit-pat-email" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label class="form-label">Phone</label><input type="tel" class="form-control" id="edit-pat-phone"></div>
                    <div class="form-group"><label class="form-label">Blood Group</label>
                        <select class="form-control" id="edit-pat-bloodGroup"><option value="">Select</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select>
                    </div>
                </div>
                <div class="form-group"><label class="form-label">Address</label><textarea class="form-control" id="edit-pat-address" rows="2"></textarea></div>
                <div class="form-group"><label class="form-label">Medical History</label><textarea class="form-control" id="edit-pat-history" rows="3"></textarea></div>
                <div class="modal-footer"><button type="button" class="btn btn-secondary" onclick="closeModal('edit-patient-modal')">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
            </form>
        </div>
    </div>
    <script src="/js/app.js"></script>
    <script src="/js/patients.js"></script>
</body>
</html>
